services:
  ai-service:
    env_file: .env.local
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      - PORT=8000
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  api:
    env_file: .env.local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '4000:4000'
    environment:
      - API_PORT=4000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - AI_SERVICE_URL=http://ai-service:8000
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      ai-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:4000/health').then(r => r.status === 200 ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  web:
    env_file: .env.local
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - AI_SERVICE_URL=http://ai-service:8000
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000').then(r => r.status === 200 ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
