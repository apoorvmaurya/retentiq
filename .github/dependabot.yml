version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

  # Maintain npm dependencies in the monorepo
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    groups:
      lint-and-typescript:
        patterns:
          - 'eslint*'
          - 'typescript*'
          - '@typescript-eslint*'
          - 'prettier*'

  # Maintain Docker dependencies
  - package-ecosystem: 'docker'
    directory: '/apps/web'
    schedule:
      interval: 'monthly'

  - package-ecosystem: 'docker'
    directory: '/apps/api'
    schedule:
      interval: 'monthly'
